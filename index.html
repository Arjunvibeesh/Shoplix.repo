<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoplix</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --white: #fff;
    --text: #18181b;
    --muted: #71717a;
    --border: #e4e4e7;
    --orange: #e8580c;
    --orange-pale: #fff3ee;
    --green: #16a34a;
    --tag: #f1f0ee;
  }

  body {
    font-family: 'Geist', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* nav */
  nav {
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.35rem;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .logo span { color: var(--orange); font-style: italic; }

  .cart-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--text);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cart-btn:hover { background: var(--orange); }

  .cart-badge {
    background: var(--orange);
    color: #fff;
    border-radius: 50%;
    width: 18px; height: 18px;
    font-size: 0.68rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* hero */
  .hero {
    padding: 56px 32px 36px;
    max-width: 700px;
  }
  .hero-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .hero h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  .hero h1 em { font-style: italic; color: var(--orange); }
  .hero p {
    color: var(--muted);
    line-height: 1.65;
    font-size: 0.97rem;
    max-width: 460px;
  }

  /* categories */
  .cats {
    padding: 0 32px 32px;
  }
  .cats-label {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .cats-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .cat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--white);
    font-size: 0.84rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    font-family: inherit;
  }
  .cat:hover { border-color: var(--text); color: var(--text); }
  .cat.on { background: var(--text); color: #fff; border-color: var(--text); }
  .cat .n {
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
  }
  .cat:not(.on) .n { background: var(--tag); color: var(--muted); }

  /* toolbar */
  .toolbar {
    padding: 0 32px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .tl { display: flex; align-items: center; gap: 10px; }
  .count { font-size: 0.84rem; color: var(--muted); }
  .count strong { color: var(--text); }

  .filter-btn {
    font-size: 0.84rem;
    font-family: inherit;
    font-weight: 500;
    color: var(--text);
    background: var(--white);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .filter-btn:hover, .filter-btn.on { border-color: var(--text); }
  .filter-btn.on { color: var(--orange); border-color: var(--orange); }

  .sort {
    font-size: 0.84rem;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    outline: none;
  }
  .sort:focus { border-color: var(--text); }

  /* filter panel */
  .filters {
    display: none;
    margin: 0 32px 20px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    gap: 28px;
    flex-wrap: wrap;
  }
  .filters.open { display: flex; }

  .fg { display: flex; flex-direction: column; gap: 10px; min-width: 150px; }
  .fg-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .fg label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.84rem;
    cursor: pointer;
  }
  .fg input[type=checkbox],
  .fg input[type=radio] { accent-color: var(--orange); cursor: pointer; }

  .price-lbl { font-size: 0.84rem; font-weight: 500; }
  input[type=range] { width: 100%; accent-color: var(--orange); }
  .stars-f { color: #f59e0b; font-size: 0.85rem; }

  /* grid */
  .grid-wrap {
    padding: 0 32px 80px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.08); }

  .card-img {
    background: var(--orange-pale);
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.2rem;
    position: relative;
  }
  .badge {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 9px;
    border-radius: 5px;
    background: var(--orange);
    color: #fff;
  }
  .badge.new { background: var(--green); }

  .wish {
    position: absolute;
    top: 8px; right: 8px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.88);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: transform 0.12s;
  }
  .wish:hover { transform: scale(1.15); }

  .card-body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .card-cat {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .card-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1rem;
    line-height: 1.3;
    color: var(--text);
    flex: 1;
  }
  .card-rating {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.77rem;
    color: var(--muted);
  }
  .card-rating .stars { color: #f59e0b; font-size: 0.75rem; }

  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .price { font-size: 1.05rem; font-weight: 600; }
  .price-old { font-size: 0.82rem; color: var(--muted); text-decoration: line-through; margin-right: 4px; }

  .add {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--text);
    color: #fff;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .add:hover { background: var(--orange); }
  .add:active { transform: scale(0.93); }

  /* empty */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .empty span { font-size: 3rem; opacity: 0.35; }
  .empty h3 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; color: var(--text); }

  /* modal */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  @media (min-width: 600px) {
    .overlay { align-items: center; padding: 24px; }
    .modal { border-radius: 12px !important; max-height: 85vh; }
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--white);
    border-radius: 12px 12px 0 0;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform 0.28s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--tag);
    border: none;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-emoji {
    text-align: center;
    font-size: 4.5rem;
    padding: 18px 0;
    background: var(--orange-pale);
    border-radius: 10px;
    margin-bottom: 18px;
  }
  .modal-cat { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .modal-title { font-family: 'Instrument Serif', serif; font-size: 1.55rem; margin-bottom: 10px; }
  .modal-rating { display: flex; align-items: center; gap: 7px; margin-bottom: 14px; font-size: 0.84rem; color: var(--muted); }
  .modal-rating .stars { color: #f59e0b; }
  .modal-desc { color: var(--muted); line-height: 1.7; font-size: 0.93rem; margin-bottom: 18px; }
  .modal-price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
  .modal-price { font-size: 1.7rem; font-weight: 700; }
  .modal-price-old { font-size: 1rem; color: var(--muted); text-decoration: line-through; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .tag { background: var(--tag); border-radius: 999px; padding: 4px 12px; font-size: 0.78rem; color: var(--muted); }
  .modal-cta {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: var(--text);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .modal-cta:hover { background: var(--orange); }

  /* cart drawer */
  .cart-bg {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .cart-bg.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(380px, 100vw);
    background: var(--white);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.28s;
    box-shadow: -4px 0 24px rgba(0,0,0,0.08);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-head {
    padding: 20px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .drawer-head h2 { font-family: 'Instrument Serif', serif; font-size: 1.2rem; }
  .drawer-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--tag);
    border: none;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .drawer-close:hover { background: var(--border); }

  .drawer-items {
    flex: 1;
    overflow-y: auto;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .ci {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px;
    background: var(--bg);
    border-radius: 9px;
  }
  .ci-icon {
    width: 44px; height: 44px;
    background: var(--orange-pale);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-size: 0.87rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ci-price { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
  .ci-ctrl { display: flex; align-items: center; gap: 7px; }
  .qb {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    transition: border-color 0.12s;
  }
  .qb:hover { border-color: var(--text); }
  .qn { font-size: 0.87rem; font-weight: 600; min-width: 18px; text-align: center; }

  .drawer-foot {
    padding: 18px 22px;
    border-top: 1px solid var(--border);
  }
  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .cart-total-row strong { font-size: 1.15rem; color: var(--text); }
  .checkout {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: var(--orange);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .checkout:hover { opacity: 0.88; }

  .cart-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .cart-empty .ei { display: block; font-size: 2.5rem; margin-bottom: 10px; opacity: 0.35; }

  /* toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.84rem;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  @media (max-width: 580px) {
    nav, .hero, .cats, .toolbar, .grid-wrap, .filters { padding-left: 16px; padding-right: 16px; }
    .filters { margin-left: 16px; margin-right: 16px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-body { padding: 10px 12px 12px; }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="#">Shoplix<span>.</span></a>
  <button class="cart-btn" id="cartBtn">
    🛍 Cart <span class="cart-badge" id="cartCount">0</span>
  </button>
</nav>

<section class="hero">
  <div class="hero-label">New arrivals weekly</div>
  <h1>Good stuff,<br>not too much <em>noise.</em></h1>
  <p>Electronics, clothing, and the little things that actually make your space feel like yours.</p>
</section>

<section class="cats">
  <div class="cats-label">Shop by category</div>
  <div class="cats-row" id="catRow"></div>
</section>

<div class="toolbar">
  <div class="tl">
    <span class="count" id="countEl"></span>
    <button class="filter-btn" id="filterBtn">⚙ Filters</button>
  </div>
  <select class="sort" id="sortSel">
    <option value="default">Featured</option>
    <option value="price-asc">Price: low → high</option>
    <option value="price-desc">Price: high → low</option>
    <option value="rating">Top rated</option>
    <option value="name">A – Z</option>
  </select>
</div>

<div class="filters" id="filterPanel">
  <div class="fg">
    <div class="fg-title">Max price</div>
    <div class="price-lbl">Up to ₹<span id="priceVal">50,000</span></div>
    <input type="range" id="priceRange" min="0" max="50000" step="500" value="50000">
  </div>
  <div class="fg">
    <div class="fg-title">Rating</div>
    <label><input type="radio" name="rat" value="0" checked> Any</label>
    <label><input type="radio" name="rat" value="4"> <span class="stars-f">★★★★</span> & up</label>
    <label><input type="radio" name="rat" value="4.5"> <span class="stars-f">★★★★★</span> only</label>
  </div>
  <div class="fg">
    <div class="fg-title">Show only</div>
    <label><input type="checkbox" id="fSale"> On sale</label>
    <label><input type="checkbox" id="fNew"> New in</label>
  </div>
</div>

<main class="grid-wrap">
  <div class="grid" id="grid"></div>
</main>

<footer>
  <span style="font-family:'Instrument Serif',serif;font-weight:700;color:var(--text);font-size:1rem">Shoplix</span>
  <span>© 2026 — built with too much coffee</span>
</footer>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<!-- Cart -->
<div class="cart-bg" id="cartBg"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>Your cart</h2>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-foot">
    <div class="cart-total-row">
      <span>Total</span>
      <strong id="cartTotal">₹0</strong>
    </div>
    <button class="checkout" id="checkoutBtn">Checkout →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const cats = [
  { id:'all', label:'All', icon:'🏪' },
  { id:'electronics', label:'Electronics', icon:'💻' },
  { id:'clothing', label:'Clothing', icon:'👕' },
  { id:'accessories', label:'Accessories', icon:'💍' },
  { id:'home', label:'Home', icon:'🏠' },
  { id:'sports', label:'Sports', icon:'🏃' },
];

const products = [
  { id:1, name:'Wireless Noise-Cancelling Headphones', category:'electronics', price:8999, oldPrice:12999, emoji:'🎧', rating:4.8, reviews:342, badge:'sale', tags:['audio','wireless','premium'], desc:'30-hour battery, adaptive ANC, and a soundstage wide enough that you forget you\'re on the tube. These actually live up to the hype.' },
  { id:2, name:'Slim 4K Laptop 14"', category:'electronics', price:49999, emoji:'💻', rating:4.7, reviews:215, badge:'', tags:['laptop','4k','thin'], desc:'OLED 4K display, i7, 16GB RAM. The kind of laptop you\'ll still want to use in five years.' },
  { id:3, name:'Smart Watch Series 8', category:'electronics', price:18999, oldPrice:22999, emoji:'⌚', rating:4.6, reviews:512, badge:'sale', tags:['wearable','health','smart'], desc:'ECG, SpO2, sleep tracking. Does most things your phone does but on your wrist and without the doomscrolling.' },
  { id:4, name:'Portable Bluetooth Speaker', category:'electronics', price:3499, emoji:'🔊', rating:4.4, reviews:188, badge:'new', tags:['audio','portable'], desc:'Waterproof, dustproof, 360° sound. Genuinely loud for the size. Takes a beating and keeps playing.' },
  { id:5, name:'Mechanical Keyboard TKL', category:'electronics', price:6499, emoji:'⌨️', rating:4.5, reviews:97, badge:'', tags:['keyboard','gaming','rgb'], desc:'Cherry MX switches, aluminium frame, per-key RGB. Typing on it feels unreasonably satisfying.' },
  { id:6, name:'4K Webcam Pro', category:'electronics', price:4999, emoji:'📷', rating:4.3, reviews:76, badge:'new', tags:['camera','streaming'], desc:'60fps 4K, built-in mics that actually cancel noise. Looks far better than anything built into a laptop.' },
  { id:7, name:'Merino Wool Crewneck', category:'clothing', price:2799, emoji:'🧥', rating:4.9, reviews:403, badge:'', tags:['wool','winter'], desc:'Extra-fine merino that\'s softer than it has any right to be. Temperature regulating, doesn\'t pill, doesn\'t itch.' },

  { id:13, name:'Canvas Tote', category:'accessories', price:899, emoji:'🛍️', rating:4.4, reviews:178, badge:'new', tags:['bag','canvas'], desc:'Heavy 12oz canvas, reinforced handles, carries 15kg without complaining. The anti-plastic bag.' },
  { id:14, name:'Automatic Watch — Bronze', category:'accessories', price:14999, emoji:'🕰️', rating:4.9, reviews:87, badge:'', tags:['watch','automatic'], desc:'In-house movement, 42hr power reserve, domed sapphire crystal. Bronze case that ages like a good jacket.' },
  { id:15, name:'Pour-Over Coffee Set', category:'home', price:2199, emoji:'☕', rating:4.8, reviews:312, badge:'', tags:['coffee','kitchen'], desc:'Handblown borosilicate dripper and stainless filter. Makes genuinely better coffee than anything with buttons on it.' },
  { id:16, name:'Ceramic Diffuser + Oils', category:'home', price:1599, oldPrice:1999, emoji:'🕯️', rating:4.5, reviews:220, badge:'sale', tags:['aroma','home'], desc:'Hand-painted ceramic, ultrasonic mist, three oils included — lavender, eucalyptus, citrus. Your flat will smell like a spa.' },
  { id:17, name:'Modular Desk Organiser', category:'home', price:1899, emoji:'🗂️', rating:4.6, reviews:148, badge:'new', tags:['desk','bamboo'], desc:'Stackable bamboo modules that actually fit together. Ships flat, assembles fast, survives cable chaos.' },
  { id:18, name:'Yoga Mat — Natural Rubber', category:'sports', price:2799, emoji:'🧘', rating:4.7, reviews:398, badge:'', tags:['yoga','eco'], desc:'4mm natural rubber, microfibre top. Non-slip even when you\'re sweating through hot yoga. Rolls in ten seconds.' },
  { id:19, name:'Adjustable Dumbbell Set', category:'sports', price:8999, oldPrice:11999, emoji:'🏋️', rating:4.8, reviews:192, badge:'sale', tags:['gym','adjustable'], desc:'5–30kg per dumbbell via dial selector. Replaces a whole rack. Oddly satisfying to click into place.' },
  { id:20, name:'Trail Running Shoes', category:'sports', price:5499, emoji:'👟', rating:4.6, reviews:264, badge:'new', tags:['trail','waterproof'], desc:'Gore-Tex, Vibram sole, 8mm drop. Built for actual mud, not just the look of someone who runs in mud.' },
];

const catMap = Object.fromEntries(cats.map(c => [c.id, c.label]));

let s = {
  cat: 'all',
  maxPrice: 50000,
  minRating: 0,
  sale: false,
  isNew: false,
  sort: 'default',
  cart: [],
  wish: new Set(),
};

function filtered() {
  let list = [...products];
  if (s.cat !== 'all') list = list.filter(p => p.category === s.cat);
  list = list.filter(p => p.price <= s.maxPrice && p.rating >= s.minRating);
  if (s.sale) list = list.filter(p => p.badge === 'sale');
  if (s.isNew) list = list.filter(p => p.badge === 'new');
  if (s.sort === 'price-asc') list.sort((a,b) => a.price - b.price);
  else if (s.sort === 'price-desc') list.sort((a,b) => b.price - a.price);
  else if (s.sort === 'rating') list.sort((a,b) => b.rating - a.rating);
  else if (s.sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  return list;
}

function stars(r) {
  return '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r));
}

function renderGrid() {
  const list = filtered();
  const g = document.getElementById('grid');
  document.getElementById('countEl').innerHTML = `<strong>${list.length}</strong> item${list.length !== 1 ? 's' : ''}`;
  if (!list.length) {
    g.innerHTML = `<div class="empty"><span>🔍</span><h3>Nothing here</h3><p>Try loosening the filters a bit.</p></div>`;
    return;
  }
  g.innerHTML = list.map((p, i) => {
    const loved = s.wish.has(p.id);
    const bdg = p.badge ? `<div class="badge ${p.badge === 'new' ? 'new' : ''}">${p.badge === 'sale' ? 'Sale' : 'New'}</div>` : '';
    const op = p.oldPrice ? `<span class="price-old">₹${p.oldPrice.toLocaleString('en-IN')}</span>` : '';
    return `
    <div class="card" style="animation:fi .3s ${i*35}ms both" onclick="openModal(${p.id})">
      <div class="card-img">
        ${bdg}
        <span>${p.emoji}</span>
        <button class="wish ${loved ? 'loved' : ''}" onclick="event.stopPropagation();toggleWish(${p.id})">${loved ? '❤️' : '🤍'}</button>
      </div>
      <div class="card-body">
        <div class="card-cat">${catMap[p.category] || p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-rating">
          <span class="stars">${stars(p.rating)}</span>
          ${p.rating} · ${p.reviews} reviews
        </div>
        <div class="card-foot">
          <div>${op}<span class="price">₹${p.price.toLocaleString('en-IN')}</span></div>
          <button class="add" onclick="event.stopPropagation();addCart(${p.id})" title="Add to cart">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderCats() {
  const counts = {};
  products.forEach(p => { counts[p.category] = (counts[p.category]||0)+1; });
  document.getElementById('catRow').innerHTML = cats.map(c => {
    const n = c.id === 'all' ? products.length : (counts[c.id]||0);
    return `<button class="cat ${s.cat===c.id?'on':''}" onclick="setCat('${c.id}')">
      ${c.icon} ${c.label} <span class="n">${n}</span>
    </button>`;
  }).join('');
}

function setCat(id) { s.cat = id; renderCats(); renderGrid(); }
function toggleWish(id) {
  s.wish.has(id) ? s.wish.delete(id) : (s.wish.add(id), toast('💛 Saved!'));
  renderGrid();
}

// cart
function addCart(id) {
  const p = products.find(x => x.id === id);
  const ex = s.cart.find(x => x.id === id);
  ex ? ex.qty++ : s.cart.push({...p, qty:1});
  renderCart();
  toast(`${p.emoji} Added to cart`);
  const el = document.getElementById('cartCount');
  el.style.transform = 'scale(1.5)';
  setTimeout(() => el.style.transform = '', 250);
}
function rmCart(id) { s.cart = s.cart.filter(x => x.id !== id); renderCart(); }
function chgQty(id, d) {
  const it = s.cart.find(x => x.id === id);
  if (!it) return;
  it.qty += d;
  it.qty < 1 ? rmCart(id) : renderCart();
}
function renderCart() {
  const el = document.getElementById('drawerItems');
  const total = s.cart.reduce((a,x) => a + x.price*x.qty, 0);
  const count = s.cart.reduce((a,x) => a + x.qty, 0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = '₹' + total.toLocaleString('en-IN');
  if (!s.cart.length) {
    el.innerHTML = `<div class="cart-empty"><span class="ei">🛍️</span>Nothing in here yet.<br>Go find something nice.</div>`;
    return;
  }
  el.innerHTML = s.cart.map(it => `
    <div class="ci">
      <div class="ci-icon">${it.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${it.name}</div>
        <div class="ci-price">₹${(it.price*it.qty).toLocaleString('en-IN')}</div>
      </div>
      <div class="ci-ctrl">
        <button class="qb" onclick="chgQty(${it.id},-1)">−</button>
        <span class="qn">${it.qty}</span>
        <button class="qb" onclick="chgQty(${it.id},1)">+</button>
      </div>
    </div>`).join('');
}

// modal
function openModal(id) {
  const p = products.find(x => x.id === id);
  const ov = document.getElementById('overlay');
  const bdg = p.badge ? `<span class="badge ${p.badge==='new'?'new':''}" style="position:static;display:inline-block;margin-bottom:10px">${p.badge==='sale'?'On sale':'New in'}</span>` : '';
  const op = p.oldPrice ? `<span class="modal-price-old">₹${p.oldPrice.toLocaleString('en-IN')}</span>` : '';
  document.getElementById('modal').innerHTML = `
    <div class="modal-top">
      <div>${bdg}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-emoji">${p.emoji}</div>
    <div class="modal-cat">${catMap[p.category]}</div>
    <div class="modal-title">${p.name}</div>
    <div class="modal-rating">
      <span class="stars">${stars(p.rating)}</span>
      ${p.rating} · ${p.reviews} reviews
    </div>
    <p class="modal-desc">${p.desc}</p>
    <div class="modal-price-row">
      <span class="modal-price">₹${p.price.toLocaleString('en-IN')}</span>${op}
    </div>
    <div class="modal-tags">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    <button class="modal-cta" onclick="addCart(${p.id});closeModal()">Add to cart — ₹${p.price.toLocaleString('en-IN')}</button>`;
  ov.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// toast
let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => el.classList.remove('show'), 2000);
}

// cart drawer
function openCart() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('cartBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('cartBg').classList.remove('open');
  document.body.style.overflow = '';
}

// events
document.getElementById('cartBtn').addEventListener('click', openCart);
document.getElementById('drawerClose').addEventListener('click', closeCart);
document.getElementById('cartBg').addEventListener('click', closeCart);
document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

document.getElementById('priceRange').addEventListener('input', e => {
  s.maxPrice = +e.target.value;
  document.getElementById('priceVal').textContent = (+e.target.value).toLocaleString('en-IN');
  renderGrid();
});
document.querySelectorAll('input[name=rat]').forEach(r => r.addEventListener('change', e => { s.minRating = +e.target.value; renderGrid(); }));
document.getElementById('fSale').addEventListener('change', e => { s.sale = e.target.checked; renderGrid(); });
document.getElementById('fNew').addEventListener('change', e => { s.isNew = e.target.checked; renderGrid(); });
document.getElementById('sortSel').addEventListener('change', e => { s.sort = e.target.value; renderGrid(); });
document.getElementById('filterBtn').addEventListener('click', () => {
  document.getElementById('filterPanel').classList.toggle('open');
  document.getElementById('filterBtn').classList.toggle('on');
});
document.getElementById('checkoutBtn').addEventListener('click', () => {
  if (!s.cart.length) { toast('Your cart is empty!'); return; }
  toast('🎉 Order placed, thanks!');
  s.cart = [];
  renderCart();
  closeCart();
});

const style = document.createElement('style');
style.textContent = `@keyframes fi { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:none } }`;
document.head.appendChild(style);

renderCats();
renderGrid();
renderCart();
</script>
</body>
</html>
